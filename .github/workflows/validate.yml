name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  jsonl-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate JSONL files
        run: node scripts/validate-jsonl.mjs .
